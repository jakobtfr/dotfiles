# AEROSPACE CONFIG
#https://github.com/agenttank/dotfiles_macos/blob/main/aerospace/aerospace.toml
start-at-login = true

after-login-command = []

on-focused-monitor-changed = [
  'move-mouse monitor-lazy-center'
]

on-focus-changed = [
  'move-mouse window-lazy-center',
]

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles'

automatically-unhide-macos-hidden-apps = false

key-mapping.preset = 'qwerty'

[gaps]
    inner.horizontal = 0
    inner.vertical =   0
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

cmd-q = [
  'close --quit-if-last-window'
]

alt-f = 'fullscreen'

cmd-h = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop left'
cmd-j = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop down'
cmd-k = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop up'
cmd-l = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop right'

cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'
cmd-shift-down = 'move down'
cmd-shift-up = 'move up'
cmd-shift-right = 'move right'

cmd-1 = 'workspace --auto-back-and-forth 1'  # Browser
cmd-2 = 'workspace --auto-back-and-forth 2'  # Terminal
cmd-3 = 'workspace --auto-back-and-forth 3'  # Random
cmd-4 = 'workspace --auto-back-and-forth 4'  # Communication
cmd-5 = 'workspace --auto-back-and-forth 5'  # 
cmd-6 = 'workspace --auto-back-and-forth 6'  # 
cmd-7 = 'workspace --auto-back-and-forth 7'  #
cmd-8 = 'workspace --auto-back-and-forth 8'  #
cmd-9 = 'workspace --auto-back-and-forth 9'  #
cmd-0 = 'workspace --auto-back-and-forth 10' # Spotify

cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'
cmd-shift-0 = 'move-node-to-workspace 10'

cmd-tab = 'workspace-back-and-forth'
cmd-p = 'move-workspace-to-monitor --wrap-around next'
cmd-shift-p = [
  'move-node-to-monitor --wrap-around next',
  'focus-monitor next --wrap-around' 
]
cmd-alt-h = []
cmd-shift-s = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']


[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = [
'layout floating'
]

[[on-window-detected]]
if.app-id = 'com.spotify.client'              
run = ['move-node-to-workspace 10']  

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'              
run = ['move-node-to-workspace 4']  

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'              
run = ['move-node-to-workspace 4']  

[[on-window-detected]]
if.app-id = 'com.apple.mail'              
run = ['move-node-to-workspace 4']  

[[on-window-detected]]
if.app-id = 'net.ankiweb.dtop'              
run = ['move-node-to-workspace 3']  

[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'              
run = ['move-node-to-workspace 2']  

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'              
run = ['move-node-to-workspace 1']  
