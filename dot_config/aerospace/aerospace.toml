# AEROSPACE CONFIG
#https://github.com/agenttank/dotfiles_macos/blob/main/aerospace/aerospace.toml
start-at-login = true

after-login-command = []

on-focused-monitor-changed = [
  'move-mouse monitor-lazy-center'
]

on-focus-changed = [
  'move-mouse window-lazy-center',
]

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles'

automatically-unhide-macos-hidden-apps = false

key-mapping.preset = 'qwerty'

[gaps]
    inner.horizontal = 0
    inner.vertical =   0
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

cmd-q = [
  'close --quit-if-last-window'
]

alt-f = 'fullscreen'

ctrl-left = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop left'
ctrl-down = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop down'
ctrl-up = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop up'
ctrl-right = 'focus --boundaries all-monitors-outer-frame --boundaries-action stop right'

ctrl-shift-h = 'move left'
ctrl-shift-j = 'move down'
ctrl-shift-k = 'move up'
ctrl-shift-l = 'move right'
ctrl-shift-down = 'move down'
ctrl-shift-up = 'move up'
ctrl-shift-right = 'move right'

ctrl-1 = 'workspace --auto-back-and-forth 1'  # Browser
ctrl-2 = 'workspace --auto-back-and-forth 2'  # Terminal
ctrl-3 = 'workspace --auto-back-and-forth 3'  # Random
ctrl-4 = 'workspace --auto-back-and-forth 4'  # Communication
ctrl-5 = 'workspace --auto-back-and-forth 5'  # 
ctrl-6 = 'workspace --auto-back-and-forth 6'  # 
ctrl-7 = 'workspace --auto-back-and-forth 7'  #
ctrl-8 = 'workspace --auto-back-and-forth 8'  #
ctrl-9 = 'workspace --auto-back-and-forth 9'  #
ctrl-0 = 'workspace --auto-back-and-forth 10' # Spotify

ctrl-shift-1 = 'move-node-to-workspace 1'
ctrl-shift-2 = 'move-node-to-workspace 2'
ctrl-shift-3 = 'move-node-to-workspace 3'
ctrl-shift-4 = 'move-node-to-workspace 4'
ctrl-shift-5 = 'move-node-to-workspace 5'
ctrl-shift-6 = 'move-node-to-workspace 6'
ctrl-shift-7 = 'move-node-to-workspace 7'
ctrl-shift-8 = 'move-node-to-workspace 8'
ctrl-shift-9 = 'move-node-to-workspace 9'
ctrl-shift-0 = 'move-node-to-workspace 10'

ctrl-alt-h = []
ctrl-shift-s = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']
    ctrl-p = ['move-workspace-to-monitor --wrap-around next']
    ctrl-shift-p = [
      'move-node-to-monitor --wrap-around next',
      'focus-monitor next --wrap-around'
    ]

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = ['move-node-to-workspace 1']

# Code
[[on-window-detected]]
if.app-id = 'com.github.wez.wezterm'
run = ['move-node-to-workspace 2']

# Communication
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = ['move-node-to-workspace 4']

# Random
[[on-window-detected]]
if.app-id = 'net.ankiweb.launcher'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = ['move-node-to-workspace 10']
