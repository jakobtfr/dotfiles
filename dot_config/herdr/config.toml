[theme]
name = "rose-pine"
auto_switch = false

[keys]
prefix = "ctrl+a"
settings = ""
detach = "prefix+d"
reload_config = "prefix+r"
resize_mode = "prefix+shift+r"
new_workspace = "prefix+shift+n"
rename_workspace = "prefix+$"
copy_mode = "prefix+["
last_pane = "ctrl+backslash"
toggle_sidebar = "prefix+b"
navigate_workspace_down = "j"
navigate_workspace_up = "k"

# Herdr does not currently support tmux's process-aware Vim passthrough, so
# keep Ctrl-h/j/k/l available to the pane and use the prefix for pane movement.
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"

# Common tmux window/pane defaults mapped to Herdr tabs/panes.
rename_tab = ["prefix+comma", "prefix+shift+t"]
close_tab = ["prefix+ampersand", "prefix+shift+x"]
split_vertical = ["prefix+percent", "prefix+v"]
split_horizontal = ["prefix+double_quote", "prefix+minus"]
swap_pane_left = ["prefix+<", "prefix+shift+h"]
swap_pane_right = ["prefix+>", "prefix+shift+l"]

[ui]
mouse_capture = true
show_agent_labels_on_pane_borders = true
agent_panel_sort = "spaces"
