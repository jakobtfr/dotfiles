session_name: Dotfiles
start_directory: ~/code/dotfiles/
windows:
  - window_name: editor
    start_directory: ~/code/dotfiles/
    panes:
      - shell_command:
        - nvim .
        focus: true
  - window_name: opencode
    start_directory: ~/code/dotfiles/
    panes:
      - shell_command:
        - opencode
