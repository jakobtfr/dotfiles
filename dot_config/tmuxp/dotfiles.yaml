session_name: Dotfiles 
windows:
  - window_name: config 
    layout: 8a4e,282x68,0,0{140x68,0,0[140x54,0,0,12,140x13,0,55,14],141x68,141,0,13}
    start_directory: ~/.config
    panes:
      - shell_command:
        - chezmoi edit .
        focus: true
      - blank
      - dotpull && agent
  - window_name: agents
    options:
      main-pane-width: 70%
    layout: main-vertical
    start_directory: ~/code/agent-scripts/
    panes:
      - shell_command:
        - nvim .
