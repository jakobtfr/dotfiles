session_name: Dotfiles 
windows:
  - window_name: config 
    options:
      main-pane-width: 80%
    layout: main-vertical
    start_directory: ~/.config
    panes:
      - shell_command:
        - chezmoi edit .
        focus: true
      - chezmoi cd && git fetch 
  - window_name: agents
    options:
      main-pane-width: 70%
    layout: main-vertical
    start_directory: ~/code/agent-scripts/
    panes:
      - shell_command:
        - nvim .
