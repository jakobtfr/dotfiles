session_name: iPraktikum
start_directory: ~/code/ipraktikum/tum
windows:
  - window_name: Dev 
    options:
      main-pane-width: 80%
    layout: main-vertical
    panes:
      - shell_command:
        - vim .
        focus: true
      - git fetch && git status
  - window_name: Server
    panes:
      - shell_command:
          - cd server && pnpm dev
